<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0b14" />
  <meta name="description"
    content="PiTrust — Decentralized Trust Oracle on Pi Network. Build your on-chain reputation." />
  <title>PiTrust — Trust Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script>
    window.__PI_SDK_READY__ = false;
    function __piSdkLoaded() {
      console.log('[PiTrust] Pi SDK script loaded');
      try {
        // Use sandbox mode only when testing in Pi Sandbox or localhost.
        // In real Pi Browser (trustpi.space / pinet.com), use production mode.
        var isSandbox = (
          window.location.hostname.includes('sandbox.minepi.com') ||
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1' ||
          window.location.search.includes('sandbox=true')
        );
        console.log('[PiTrust] Pi.init sandbox=' + isSandbox + ' (host: ' + window.location.hostname + ')');
        Pi.init({ version: "2.0", sandbox: isSandbox });
        window.__PI_SDK_READY__ = true;
        console.log('[PiTrust] Pi.init() completed successfully');
        window.dispatchEvent(new Event('pi-sdk-ready'));
      } catch (e) {
        console.error('[PiTrust] Pi SDK Init Error:', e);
      }
    }
  </script>
  <script src="https://sdk.minepi.com/pi-sdk.js" onload="__piSdkLoaded()"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
